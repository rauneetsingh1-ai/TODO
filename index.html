<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO-DO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container" id="otpSection">
    <h1>YOUR DAY TO DAY BUDDY!</h1>
    <label>Enter your email:</label>
    <input
        type="email"
        placeholder="Email"
        id="emailId"
        name="email">
    <button type="button" id="gmail">Send OTP</button>
    <p id="timer"></p>
    <p id="message"></p>
    <br>
    <label>Enter the OTP:</label>
    <input
        type="text"
        placeholder="otp"
        id="codeId">
    <button type="submit" id="otpVerify">Verify</button>
    <!-- button disabled for not using before the otp time limit reaches -->
    <button type="button" id="resendOtp" disabled> Resend OTP</button>
</div>
<div class="container" id="todoSection" style="display: none;">
    <p class="quote">Keep taking small steps forward.</p>
    <h1>MY TODO LIST</h1>
    <p id="todoMessage"></p>
    <button id="logoutButton">Logout</button>
    <input
        type="text"
        id="taskinput"
        placeholder="Enter the task..">
    <button id="addTaskButton">ADD TASK</button>
    <ul id="taskList"></ul>
</div>
<script src="script.js"></script>
</body>
</html>
